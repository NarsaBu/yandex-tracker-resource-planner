UnderestimatedTasksResponse:
  description: Information about underestimated tasks
  required:
    - task
  type: object
  properties:
    task:
      $ref: '#/components/schemas/TaskContent'

components:
  schemas:
    TaskContent:
      description: Information about underestimated task content
      required:
        - taskId
        - taskName
        - taskStatus
        - underestimatedHours
      type: object
      properties:
        taskId:
          description: Task identifier
          type: string
          example: "CALCSP-1101"
        taskName:
          description: Task name
          type: string
          example: "Some task name"
        taskStatus:
          description: Status of the task
          type: string
          example: "In Progress"
        underestimatedHours:
          description: Underestimated task value in hours
          type: number
          format: double
          example: 11.5
